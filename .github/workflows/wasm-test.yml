name: WASM Build Test

on:
  push:
    branches:
      - 0.1.1
  workflow_dispatch:

jobs:
  wasm-test:
    name: Build and test WASM
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install wasm-pack
        run: |
          curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
          wasm-pack --version

      - name: Build WASM
        run: wasm-pack build ogex --target nodejs --release --features wasm

      - name: Add Regex alias export
        run: |
          cd ogex/pkg
          # Add Regex, Match, Error as aliases for JsRegex, JsMatch, JsError
          # The nodejs target uses CommonJS
          node -e "
            const fs = require('fs');
            let js = fs.readFileSync('ogex.js', 'utf8');
            // Add Regex alias
            js = js.replace(
              'exports.JsRegex = JsRegex;',
              'exports.JsRegex = JsRegex;\\nexports.Regex = JsRegex;'
            );
            // Add Match alias
            js = js.replace(
              'exports.JsMatch = JsMatch;',
              'exports.JsMatch = JsMatch;\\nexports.Match = JsMatch;'
            );
            // Add Error alias
            js = js.replace(
              'exports.JsError = JsError;',
              'exports.JsError = JsError;\\nexports.Error = JsError;'
            );
            fs.writeFileSync('ogex.js', js);
          "

      - name: Upload WASM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wasm-package
          path: ogex/pkg/
          retention-days: 7
