name: WASM Build Test

on:
  push:
    branches:
      - 0.1.1
  workflow_dispatch:

jobs:
  wasm-test:
    name: Build and test WASM
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install wasm-pack
        run: |
          curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
          wasm-pack --version

      - name: Build WASM
        run: wasm-pack build ogex --target bundler --release --features wasm

      - name: Install dependencies and test
        working-directory: ogex/pkg
        run: |
          npm install
          # Run a quick test to verify WASM loads
          node -e "
            const init = require('./ogex.js');
            init().then(module => {
              const { Regex } = module;
              const regex = new Regex('(name:hello)');
              const m = regex.find('hello world');
              if (m && m.text === 'hello') {
                console.log('✅ WASM test passed: Regex found \"hello\"');
              } else {
                console.error('❌ WASM test failed');
                process.exit(1);
              }
            }).catch(err => {
              console.error('❌ Failed to load WASM:', err);
              process.exit(1);
            });
          "

      - name: Upload WASM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wasm-package
          path: ogex/pkg/
          retention-days: 7
