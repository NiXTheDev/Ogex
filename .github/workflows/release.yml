name: Create Release

on:
  pull_request:
    types: [closed]
    branches:
      - release

jobs:
  create-release:
    # Only run if PR was merged and has 'release' label
    if: github.event.pull_request.merged == true && contains(github.event.pull_request.labels.*.name, 'release')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Get version from Cargo.toml
        id: get_version
        run: |
          VERSION=$(grep -m1 'version = ' Cargo.toml | sed 's/version = "\(.*\)"/\1/')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=v$VERSION" >> $GITHUB_OUTPUT
          echo "Releasing version: $VERSION"

      - name: Get PR body for release notes
        id: get_pr
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PR_NUMBER="${{ github.event.pull_request.number }}"
          echo "Fetching PR #$PR_NUMBER..."

          # Get PR title
          PR_TITLE=$(gh pr view $PR_NUMBER --json title -q '.title')
          PR_TITLE="${PR_TITLE//$'\n'/\\n}"
          echo "title=$PR_TITLE" >> $GITHUB_OUTPUT

          # Get PR body - encode to handle newlines
          PR_BODY=$(gh pr view $PR_NUMBER --json body -q '.body // ""')
          if [ -z "$PR_BODY" ]; then
            PR_BODY="No description provided"
          fi
          echo "$PR_BODY" > /tmp/pr_body.txt
          PR_BODY_ENCODED=$(base64 -w0 /tmp/pr_body.txt)
          echo "body=$PR_BODY_ENCODED" >> $GITHUB_OUTPUT

      - name: Check if tag exists
        id: check_tag
        run: |
          if git rev-parse "${{ steps.get_version.outputs.tag }}" >/dev/null 2>&1; then
            echo "Tag already exists"
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "Tag does not exist"
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Create Git Tag
        if: steps.check_tag.outputs.exists == 'false'
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git tag -a "${{ steps.get_version.outputs.tag }}" -m "Release ${{ steps.get_version.outputs.tag }}"
          git push origin "${{ steps.get_version.outputs.tag }}"

      - name: Decode PR body for comment
        id: decode_body
        run: |
          if [ -n "${{ steps.get_pr.outputs.body }}" ]; then
            DECODED_BODY=$(echo "${{ steps.get_pr.outputs.body }}" | base64 -d)
            # Escape for JSON
            ESCAPED_BODY=$(echo "$DECODED_BODY" | jq -Rs .)
            echo "body=$ESCAPED_BODY" >> $GITHUB_OUTPUT
          else
            echo 'body=""' >> $GITHUB_OUTPUT
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.get_version.outputs.tag }}
          name: "${{ steps.get_pr.outputs.title }}"
          body: "${{ steps.get_pr.outputs.body }}"
          draft: false
          prerelease: false
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Comment on PR
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh pr comment ${{ github.event.pull_request.number }} --body "Release ${{ steps.get_version.outputs.tag }} published to crates.io, npm (@ogex-nu/ogex), PyPI"

  publish-crates:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    environment: crates.io
    needs: create-release
    if: github.event.pull_request.merged == true && contains(github.event.pull_request.labels.*.name, 'release')
    env:
      CRATES_IO_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}
    strategy:
      matrix:
        crate: [ogex, ogex-cli]

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cargo login
        run: echo "$CRATES_IO_TOKEN" | cargo login --

      - name: Publish to crates.io
        run: cargo publish -p ${{ matrix.crate }}

  publish-npm:
    name: Publish to npm (@ogex-nu/ogex)
    runs-on: ubuntu-latest
    environment: npm
    needs: create-release
    if: github.event.pull_request.merged == true && contains(github.event.pull_request.labels.*.name, 'release')
    env:
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
          token: ${{ env.NPM_TOKEN }}

      - name: Install wasm-pack
        run: |
          curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
          wasm-pack --version

      - name: Build WASM
        run: wasm-pack build ogex --scope ogex-nu --target nodejs --release --features wasm

      - name: Update README with JS/TS examples
        run: cp ogex/README.wasm.md ogex/pkg/README.md

      - name: Add Regex alias export
        run: |
          cd ogex/pkg
          # Add Regex, Match, Error as aliases for JsRegex, JsMatch, JsError
          # The nodejs target uses CommonJS
          node -e "
            const fs = require('fs');
            let js = fs.readFileSync('ogex.js', 'utf8');
            // Add Regex alias
            js = js.replace(
              'exports.JsRegex = JsRegex;',
              'exports.JsRegex = JsRegex;\\nexports.Regex = JsRegex;'
            );
            // Add Match alias
            js = js.replace(
              'exports.JsMatch = JsMatch;',
              'exports.JsMatch = JsMatch;\\nexports.Match = JsMatch;'
            );
            // Add Error alias
            js = js.replace(
              'exports.JsError = JsError;',
              'exports.JsError = JsError;\\nexports.Error = JsError;'
            );
            fs.writeFileSync('ogex.js', js);
          "

      - name: Publish to npm
        run: cd ogex/pkg && npm publish --access public

  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    environment: pypi
    needs: create-release
    if: github.event.pull_request.merged == true && contains(github.event.pull_request.labels.*.name, 'release')
    env:
      PYPI_TOKEN: ${{ secrets.PYPI_TOKEN }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'

      - name: Install dependencies
        run: pip install build maturin

      - name: Build and publish
        run: |
          cd ogex-python
          python -m build
          maturin publish --no-build-hook
