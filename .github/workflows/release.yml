name: Release

on:
  push:
    tags:
      - 'v*'
  pull_request:
    branches:
      - release
    types:
      - closed

jobs:
  release:
    name: Release ${{ matrix.crate }}
    runs-on: ubuntu-latest
    if: (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) || (github.event_name == 'pull_request' && github.event.pull_request.merged == true && contains(github.event.pull_request.labels.*.name, 'Release'))
    strategy:
      matrix:
        include:
          - crate: ogex
            publish: true
          - crate: ogex-cli
            publish: true
          - crate: ogex-python
            publish: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build release
        run: cargo build --release -p ${{ matrix.crate }}

      - name: Publish to crates.io
        if: matrix.publish
        run: cargo publish -p ${{ matrix.crate }}
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  publish-npm:
    name: Publish to npm (@ogex/ogex)
    runs-on: ubuntu-latest
    needs: release

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install wasm-pack
        run: |
          curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
          wasm-pack --version

      - name: Build WASM
        run: wasm-pack build ogex --target bundler --release --features wasm

      - name: Add Regex alias export
        run: |
          cd ogex/pkg
          # Add Regex, Match, Error as aliases for JsRegex, JsMatch, JsError
          # The bundler target uses ESM, so we add additional exports to ogex.js
          node -e "
            const fs = require('fs');
            let js = fs.readFileSync('ogex.js', 'utf8');
            // Add alias exports after the main export
            const aliases = '\\nexport { JsRegex as Regex, JsMatch as Match, JsError as Error };';
            fs.writeFileSync('ogex.js', js + aliases);
          "

      - name: Update package.json
        run: |
          cd ogex/pkg
          npm pkg set name="@ogex/ogex"
          npm pkg set version="${{ github.ref_name }}"
          npm pkg set description="Ogex regex engine for JavaScript/TypeScript"
          npm pkg set repository.type="git"
          npm pkg set repository.url="https://github.com/NiXTheDev/Ogex"
          npm pkg set keywords="[regex,pattern-matching]"
          npm pkg set license="MPL-2.0"
          npm pkg set main="ogex.js"
          npm pkg set types="ogex.d.ts"
          cat package.json

      - name: Publish to npm
        run: cd ogex/pkg && npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: release

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install build maturin

      - name: Build and publish
        run: |
          cd ogex-python
          python -m build
          maturin publish
        env:
          MATURIN_PYPI_TOKEN: ${{ secrets.PYPI_TOKEN }}
