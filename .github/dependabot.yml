# dependabot.yml
# Configuration for Dependabot dependency updates
#
# NOTE: Dependabot doesn't support regex for target-branch directly.
# The regex for valid semver branches: ^\d(?:\.\d(?:\.\d(?:\.\d)?)?)?(?:-\w+)?$
# For semver branches, manually create PRs or use a custom workflow.

version: 2
updates:
  # Enable version updates for Cargo (Rust) dependencies
  - package-ecosystem: "cargo"
    directory: "/"
    # Target main branch - PRs will be created against main
    # For semver release branches, manually cherry-pick or merge
    versioning-strategy: "increase"
    open-pull-requests-limit: 10
    schedule:
      interval: "weekly"
      day: "sunday"
      time: "06:00"
      timezone: "UTC"
    commit-message:
      prefix: "deps"
      include: "scope"
    labels:
      - "dependencies"
      - "rust"

  # Enable version updates for GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "sunday"
      time: "06:00"
      timezone: "UTC"
    commit-message:
      prefix: "ci"
      include: "scope"
    labels:
      - "dependencies"
      - "github-actions"
